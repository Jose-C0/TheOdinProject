services:
  app:
    container_name: app-file-uploader
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT_NODE_SERVER}:${PORT_NODE_SERVER_DOCKER}"
    stdin_open: true
    tty: true  # Keeps the container running for debugging
    depends_on:
      postgres_server_db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    env_file:
      - path: ./.env
    networks:
      - app
      - prisma-network

  postgres_server_db:
    container_name: postgres_server_db
    image: postgres:17.1
    restart: always
    environment:
      - POSTGRES_DB=${DATABASE_DB}
      - POSTGRES_USER=${postgres}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
    ports:
      - "${PUBLIC_PORT_DB}:5432"
    networks:
      - prisma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d postgres"]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - postgres_data_prisma:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*'
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  prisma-studio:
    container_name: prisma-studio
    image: node:lts-alpine3.17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    command: npx prisma studio --port 5555 --browser none
    ports:
      - "5555:5555"
    env_file:
      - ./.env
    networks:
      - prisma-network
    depends_on:
      postgres_server_db:
        condition: service_healthy
      app:
        condition: service_started

networks:
  app:
  prisma-network:
    name: prisma-network

volumes:
  postgres_data_prisma:
    name: "postgres_data_prisma"

 
